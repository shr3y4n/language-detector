<!DOCTYPE html>
<html>
<head>
    <title>Language Detector</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 40px;
        }

        .container {
            width: 70%;
            margin: auto;
        }

        textarea {
            width: 100%;
            height: 180px;
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
        }

        .upload-box {
            margin-top: 20px;
            padding: 20px;
            border: 2px solid #38bdf8;
            border-radius: 10px;
            background: #1e293b;
        }

        input[type="file"] {
            margin-top: 10px;
            color: white;
        }

        button {
            margin-top: 25px;
            padding: 12px 25px;
            background: #38bdf8;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
        }

        button:hover {
            background: #0ea5e9;
        }

        #result {
            margin-top: 30px;
            font-size: 22px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🚀 Programming Language Detector</h1>

    <p>Paste your source code or upload a file</p>

    <textarea id="code" placeholder="Paste your code here..."></textarea>

    <div class="upload-box">
        <h3>Upload Source Code File</h3>
        <input type="file" id="fileInput">
    </div>

    <button onclick="detect()">Detect Language</button>

    <h2 id="result"></h2>

</div>

<script>

async function detect() {

    let formData = new FormData();

    const fileInput = document.getElementById("fileInput");

    if (fileInput.files.length > 0) {
        formData.append("file", fileInput.files[0]);
    }
    else {
        let code = document.getElementById("code").value;
        formData.append("code", code);
    }

    let response = await fetch("/predict", {
        method: "POST",
        body: formData
    });

    let data = await response.json();

    document.getElementById("result").innerText =
        "Detected Language: " + data.language +
        "\nConfidence: " + (data.confidence || "N/A");
}

</script>

</body>
</html>
